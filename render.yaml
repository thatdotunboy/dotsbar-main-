services:
  - type: web
    name: dotsbar
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        sync: false
        description: "A secure key for JWT signing. Leave blank to auto-generate a random secure secret."
      - key: SPORTS_API_KEY
        sync: false
        description: "Optional: Your RapidAPI key for Sports API. If empty, the app will use its free public provider fallback."
